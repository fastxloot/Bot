<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holika Dahan Special</title>

<style>
body{
    margin:0;
    padding:0;
    text-align:center;
    font-family:Arial, sans-serif;
    background: radial-gradient(circle at center, #2b0000, #000000);
    color:white;
}

/* Heading */
h1{
    margin-top:20px;
    font-size:28px;
    text-shadow:0 0 15px orange;
}

/* Fire Animation */
.fire{
    position:relative;
    width:100px;
    height:150px;
    margin:20px auto;
}

.flame{
    position:absolute;
    bottom:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 50% 80%, yellow, orange, red);
    border-radius:50% 50% 40% 40%;
    animation: flicker 0.2s infinite alternate;
    filter: blur(2px);
}

@keyframes flicker{
    0%{ transform: scaleY(1) scaleX(1); }
    100%{ transform: scaleY(1.1) scaleX(0.9); }
}

/* Input */
input{
    padding:10px;
    border-radius:20px;
    border:none;
    font-size:16px;
    text-align:center;
    width:80%;
    max-width:250px;
}

/* Button */
button{
    padding:10px 20px;
    border-radius:20px;
    border:none;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
    background:orange;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:red;
    box-shadow:0 0 15px orange;
}

/* Wish Card */
#wishCard{
    display:none;
    margin-top:25px;
    padding:15px;
    width:85%;
    margin-left:auto;
    margin-right:auto;
    background:rgba(255,140,0,0.15);
    border-radius:15px;
    animation: pop 0.6s ease forwards;
    word-wrap: break-word;
    font-size:18px;
    line-height:1.6;
}

@keyframes pop{
    from{opacity:0; transform:scale(0.7);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<h1> Shubh Holika Dahan </h1>

<div class="fire">
    <div class="flame"></div>
</div>

<h3> Alok Kumar ki taraf se </h3>

<input type="text" id="receiver" placeholder="Yahan Naam Likho">
<br>
<button onclick="generateWish()">Agni Prakash </button>

<div id="wishCard">
    <div id="wishText"></div>
</div>

<script>
function generateWish(){
    var receiver=document.getElementById("receiver").value;

    if(receiver===""){
        alert("Pehle naam likho ");
        return;
    }

    document.getElementById("wishCard").style.display="block";

    document.getElementById("wishText").innerHTML=
    " Alok Kumar ki taraf se <br><br>" +
    " " + receiver + " ji <br><br>" +
    "Shubh Holika Dahan <br>" +
    "Agni aapke jeevan me khushiyan aur safalta laaye ";
}
</script>

</body>
</html>
